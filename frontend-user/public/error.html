<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyCard Error</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --panel: #ffffff;
        --text: #15171d;
        --muted: #6b7280;
        --accent: #d32f2f;
        --accent-hover: #b71c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        background:
          radial-gradient(circle at top, rgba(211, 47, 47, 0.08), transparent 42%),
          linear-gradient(180deg, #fbfcff 0%, var(--bg) 100%);
        color: var(--text);
      }

      .panel {
        width: 100%;
        max-width: 460px;
        padding: 48px 36px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 24px 70px rgba(17, 24, 39, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(28px, 5vw, 36px);
        line-height: 1.3;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
        font-size: 16px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 180px;
        margin-top: 32px;
        padding: 14px 20px;
        border-radius: 999px;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        transition: background-color 0.2s ease, transform 0.2s ease;
      }

      a:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>요청하신 페이지를 처리할 수 없습니다.</h1>
      <p>잠시 후 다시 시도해 주세요.</p>
      <a href="/">메인으로 이동</a>
    </main>
  </body>
</html>
